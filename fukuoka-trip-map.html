// ============================================

let userLocationCircle = null;
let watchId = null;

// 建立定位按鈕

  const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
  div.innerHTML = '<button id="location-btn" style="width:34px;height:34px;background:#fff;border:none;border-radius:4px;cursor:pointer;font-size:20px;box-shadow:0 2px 6px rgba(0,0,0,0.2);" title="顯示我的位置">📍</button>';
  L.DomEvent.disableClickPropagation(div);
  return div;
};
locationButton.addTo(map);

// 定位按鈕點擊事件
document.addEventListener('click', function(e) {
  if (e.target.id === 'location-btn') {
    toggleLocationTracking();
  }
});

// 計算兩點之間距離（公里）
function calculateDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; // 地球半徑（公里）
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// 格式化距離顯示
function formatDistance(km) {
  if (km < 1) {
    return Math.round(km * 1000) + 'm';
  }
  return km.toFixed(1) + 'km';
}

// 開啟/關閉定位追蹤
function toggleLocationTracking() {
  const btn = document.getElementById('location-btn');
  
  if (watchId !== null) {
    // 關閉定位
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    if (userLocationMarker) {
      map.removeLayer(userLocationMarker);
      userLocationMarker = null;
    }
    if (userLocationCircle) {
      map.removeLayer(userLocationCircle);
      userLocationCircle = null;
    }
    btn.innerHTML = '📍';
    btn.style.background = '#fff';
  } else {
    // 開啟定位
    if (!navigator.geolocation) {
      alert('你的瀏覽器不支持定位功能 😢');
      return;
    }
    
    btn.innerHTML = '⏳';
    btn.style.background = '#E3F2FD';
    
    watchId = navigator.geolocation.watchPosition(
      function(position) {
        updateUserLocation(position);
        btn.innerHTML = '🎯';
        btn.style.background = '#4CAF50';
      },
      function(error) {
        console.error('定位錯誤:', error);
        alert('無法獲取你的位置 😢\n請確保已開啟位置權限');
        watchId = null;
        btn.innerHTML = '📍';
        btn.style.background = '#fff';
      },
      {
        enableHighAccuracy: true,
        maximumAge: 10000,
        timeout: 10000
      }
    );
  }
}

// 更新用戶位置
function updateUserLocation(position) {
  const lat = position.coords.latitude;
  const lng = position.coords.longitude;
  const accuracy = position.coords.accuracy;
  
  // 移除舊標記
  if (userLocationMarker) map.removeLayer(userLocationMarker);
  if (userLocationCircle) map.removeLayer(userLocationCircle);
  
  // 建立定位圓圈（顯示精確度）
  userLocationCircle = L.circle([lat, lng], {
    radius: accuracy,
    color: '#2196F3',
    fillColor: '#2196F3',
    fillOpacity: 0.15,
    weight: 1
  }).addTo(map);
  
  // 建立用戶位置標記
  userLocationMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: 'user-location-marker',
      html: '<div style="width:16px;height:16px;background:#2196F3;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 2px #2196F3;"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    }),
    zIndexOffset: 2000
  }).addTo(map);
  
  // 居中到用戶位置（首次定位）
  if (watchId && !userLocationMarker) {
    map.setView([lat, lng], 15);
  }
  
  // 更新所有標記的距離顯示
  updateDistanceToAllMarkers(lat, lng);
}

// 更新所有標記的距離顯示
function updateDistanceToAllMarkers(userLat, userLng) {
  allMarkers.forEach(marker => {
    const markerLatLng = marker.getLatLng();
    const distance = calculateDistance(userLat, userLng, markerLatLng.lat, markerLatLng.lng);
    const distanceText = formatDistance(distance);
    
    // 更新 popup 內容，加入距離和導航按鈕
    const originalContent = marker.options.popupContent;
    const newContent = `
      ${originalContent}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #e0e0e0;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;color:#666;">📍 距離你：<strong style="color:#2196F3;">${distanceText}</strong></span>
        </div>
        <a href="https://www.google.com/maps/dir/?api=1&destination=${markerLatLng.lat},${markerLatLng.lng}" 
           target="_blank" 
           style="display:block;background:#4CAF50;color:#fff;padding:8px;border-radius:6px;text-align:center;text-decoration:none;font-size:13px;font-weight:600;">
          🧭 開始導航
        </a>
      </div>
    `;
    marker.getPopup().setContent(newContent);
  });
}

// Tile layer - clean style
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

// ============================================
// MARKERS & LAYERS
// ============================================
const dayLayers = {};
const dayRouteLines = {};
const allMarkers = [];

// Create custom icon
function createIcon(day, type) {
  const color = dayColors[day];
  let emoji = '📍';
  if (type.includes('✈️')) emoji = '✈️';
  else if (type.includes('🏨')) emoji = '🏨';
  else if (type.includes('🍽️')) emoji = '🍽️';
  else if (type.includes('☕')) emoji = '☕';
  else if (type.includes('🍮')) emoji = '🍮';
  else if (type.includes('🛍️')) emoji = '🛍️';
  else if (type.includes('⛩️')) emoji = '⛩️';
  else if (type.includes('🛶')) emoji = '🛶';
  else if (type.includes('🌺')) emoji = '🌺';
  else if (type.includes('🌳')) emoji = '🌳';
  else if (type.includes('🎨')) emoji = '🎨';
  else if (type.includes('🏡')) emoji = '🏡';
  else if (type.includes('🏯')) emoji = '🏯';
  
  return L.divIcon({
    className: '',
    html: `<div style="
      background: ${color};
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      border: 3px solid #fff;
      cursor: pointer;
      transition: transform 0.2s;
    " onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">${emoji}</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17],
    popupAnchor: [0, -20]
  });
}

// Create markers for each day
for (let d = 1; d <= 5; d++) {
  dayLayers[d] = L.layerGroup();
  const dayLocs = locations.filter(l => l.day === d);
  const routeCoords = [];
  let totalDist = 0;
  
  dayLocs.forEach((loc, idx) => {
    const marker = L.marker([loc.lat, loc.lng], {
      icon: createIcon(loc.day, loc.type)
    });
    
    // Calculate distance from previous point
    let distInfo = '';
    if (idx > 0) {
      const prev = dayLocs[idx-1];
      const d = calcDist(prev.lat, prev.lng, loc.lat, loc.lng);
      totalDist += d;
      distInfo = `<div style="color:#666; font-size:11px; margin-top:4px;">📏 距上一站: ${d.toFixed(1)} km</div>`;
    }

    const popupContent = `
      <div>
        <div class="popup-day" style="background:${dayColors[loc.day]}">${dayLabels[loc.day]}</div>
        <div class="popup-title">${loc.name}</div>
        <div class="popup-type">${loc.type}</div>
        <div class="popup-desc">${loc.desc}</div>
        ${distInfo}
      </div>
    `;
    
    marker.bindPopup(popupContent, { className: 'custom-popup', maxWidth: 280 });
    
    // 保存原始 popup 內容
    marker.options.popupContent = popupContent;
    
    marker.locData = loc;
    dayLayers[d].addLayer(marker);
    allMarkers.push(marker);
    routeCoords.push([loc.lat, loc.lng]);
  });
  
  // Route line for the day
  if (routeCoords.length > 1) {
    dayRouteLines[d] = L.polyline(routeCoords, {
      color: dayColors[d],
      weight: 3,
      opacity: 0.5,
      dashArray: '8, 8'
    });
    dayLayers[d].addLayer(dayRouteLines[d]);
    dayRouteLines[d].totalDist = totalDist;
  }
  
  dayLayers[d].addTo(map);
}

// Haversine distance
function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const dLat = (lat2-lat1) * Math.PI / 180;
  const dLon = (lon2-lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
          Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// ============================================
// DAY FILTER BUTTONS
// ============================================
const filtersDiv = document.getElementById('dayFilters');
const activeDays = new Set([1, 2, 3, 4, 5]);

// "All" button
const allBtn = document.createElement('button');
allBtn.className = 'day-btn active';
allBtn.style.background = '#666';
allBtn.textContent = '全部';
allBtn.onclick = () => {
  activeDays.clear();
  for (let d = 1; d <= 5; d++) activeDays.add(d);
  updateMapLayers();
};
filtersDiv.appendChild(allBtn);

for (let d = 1; d <= 5; d++) {
  const btn = document.createElement('button');
  btn.className = 'day-btn active';
  btn.style.background = dayColors[d];
  btn.textContent = `Day ${d}`;
  btn.dataset.day = d;
  btn.onclick = () => {
    // Solo mode: show only this day
    activeDays.clear();
    activeDays.add(d);
    updateMapLayers();
  };
  filtersDiv.appendChild(btn);
}

function updateMapLayers() {
  // Update buttons
  document.querySelectorAll('.day-btn').forEach(btn => {
    if (btn.textContent === '全部') {
      btn.classList.toggle('active', activeDays.size === 5);
    } else {
      const d = parseInt(btn.dataset.day);
      btn.classList.toggle('active', activeDays.has(d));
    }
  });
  
  // Update layers
  for (let d = 1; d <= 5; d++) {
    if (activeDays.has(d)) {
      if (!map.hasLayer(dayLayers[d])) map.addLayer(dayLayers[d]);
    } else {
      if (map.hasLayer(dayLayers[d])) map.removeLayer(dayLayers[d]);
    }
  }
  
  // Update legend
  renderLegend();
  
  // Fit bounds to visible markers
  const visibleCoords = [];
  allMarkers.forEach(m => {
    if (activeDays.has(m.locData.day)) {
      visibleCoords.push([m.locData.lat, m.locData.lng]);
    }
  });
  if (visibleCoords.length > 0) {
    map.fitBounds(visibleCoords, { padding: [60, 60], maxZoom: 14 });
  }
}

// ============================================
// LEGEND
// ============================================
const legendDiv = document.getElementById('legendContent');

function renderLegend() {
  legendDiv.innerHTML = '';
  
  for (let d = 1; d <= 5; d++) {
    if (!activeDays.has(d)) continue;
    
    const section = document.createElement('div');
    section.className = 'day-section';
    
    const title = document.createElement('div');
    title.className = 'day-title';
    title.style.borderBottomColor = dayColors[d];
    title.style.color = dayColors[d];
    title.textContent = dayLabels[d];
    section.appendChild(title);
    
    const dayLocs = locations.filter(l => l.day === d);
    dayLocs.forEach((loc, idx) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `
        <span class="legend-dot" style="background:${dayColors[d]}"></span>
        <span class="legend-label">${loc.name}</span>
        <span class="legend-type">${loc.type.split(' ')[0]}</span>
      `;
      item.onclick = () => {
        // Find the marker and open popup
        const targetMarker = allMarkers.find(m => m.locData === loc);
        if (targetMarker) {
          map.setView([loc.lat, loc.lng], 15, { animate: true });
          targetMarker.openPopup();
        }
      };
      section.appendChild(item);
    });
    
    legendDiv.appendChild(section);
  }
}

renderLegend();

// ============================================
// INITIAL UPDATE
// ============================================
updateMapLayers();
</script>
</body>
</html>
